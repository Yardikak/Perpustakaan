<!DOCTYPE html>
<html>
    <head>
        <title>Dashboard</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <style>
            html, body {
                height: 100%;
                margin: 0;
            }
        </style>
    </head>
    <body>
        <div class="container my-3">
        
            <div class="row">
                <div class="col-md-8 mx-auto rounded border p-4">
                    <h2 class="text-center mb-5">New Buku</h2>
    
                    <form method="post" th:object="${bukuDto}">
                        <div class="row mb-3">
                            <label class="col-sm-4 col-form-label">Judul</label>
                            <div class="col-sm-8">
                                <input class="form-control" th:field="${bukuDto.judul}">
                                <p th:if="${#fields.hasErrors('judul')}"  th:errorclass="text-danger" th:errors="${bukuDto.judul}"></p>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <label class="col-sm-4 col-form-label">Penerbit</label>
                            <div class="col-sm-8">
                                <input class="form-control" th:field="${bukuDto.penerbit}">
                                <p th:if="${#fields.hasErrors('penerbit')}"  th:errorclass="text-danger" th:errors="${bukuDto.penerbit}"></p>
                            </div>
                        </div>
    
                        <div class="row mb-3">
                            <label class="col-sm-4 col-form-label">Pengarang</label>
                            <div class="col-sm-8">
                                <input class="form-control" th:field="${bukuDto.pengarang}">
                                <p th:if="${#fields.hasErrors('pengarang')}"  th:errorclass="text-danger" th:errors="${bukuDto.pengarang}"></p>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <label class="col-sm-4 col-form-label">Tahun Terbit</label>
                            <div class="col-sm-8">
                                <input class="form-control" th:field="${bukuDto.tahunTerbit}">
                                <p th:if="${#fields.hasErrors('tahunTerbit')}"  th:errorclass="text-danger" th:errors="${bukuDto.tahunTerbit}"></p>
                            </div>
                        </div>
    
                        <div class="row">
                            <div class="offset-sm-4 col-sm-4 d-grid">
                                <button type="submit" class="btn btn-primary">Submit</button>
                            </div>
                            <div class="col-sm-4 d-grid">
                                <a class="btn btn-outline-primary" href="/bukus">Cancel</a>
                            </div>
                        </div>
    
                    </form>
                </div>
            </div>
            
        </div>
    </body>
</html>
