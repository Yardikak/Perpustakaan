<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Lihat Buku</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body>
        <div class="container mt-5">
            <h2 class="text-center mb-5">Daftar Buku</h2>
            <div class="mb-4 justify-end">
                <a class="btn btn-primary" href="index.html">Kembali</a>
            </div>
            <table class="table table-hover table-striped table-bordered align-middle">
                <thead class="table-blue">
                    <tr>
                        <th scope="col" class="text-center">ID</th>
                        <th scope="col" class="text-center">Judul</th>
                        <th scope="col" class="text-center">Pengarang</th>
                        <th scope="col" class="text-center">Penerbit</th>
                        <th scope="col" class="text-center">Tahun Terbit</th>
                        <th scope="col" class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="buku : ${bukus}">
                        <td th:text="${buku.id}" class="text-center"></td>
                        <td th:text="${buku.judul}" class="text-center"></td>
                        <td th:text="${buku.pengarang}" class="text-center"></td>
                        <td th:text="${buku.penerbit}" class="text-center"></td>
                        <td th:text="${buku.tahunTerbit}" class="text-center"></td>
                        <td class="text-center"> 
                            <a th:href="@{/editBuku(id=${buku.id})}" class="btn btn-primary"> 
                                Edit
                            </a>
                            <a th:href="@{/deleteBuku(id=${buku.id})}" class="btn btn-danger">
                                Hapus
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </body>
</html>
